<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161625;
    --border: #1e1e35;
    --accent: #4d9fff;
    --accent2: #7b5fff;
    --text: #e8eaf6;
    --muted: #555870;
    --done: #0a1a3a;
    --done-text: #4d9fff;
    --rest: #0e0e1a;
    --rest-text: #4a4a88;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); }
  .header-date { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .today-badge {
    background: var(--accent);
    color: #080810;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .rest-badge {
    background: var(--rest);
    color: var(--rest-text);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid #2a2a4a;
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* CONTENT */
  .content { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* TODAY CARD */
  .today-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .today-info h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .today-info p { font-size: 13px; color: var(--muted); }
  .postpone-note {
    font-size: 12px;
    color: var(--accent2);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* PROGRESS BAR */
  .progress-wrap { margin: 12px 0 0; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  /* ACTION BUTTONS */
  .action-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #080810; }
  .btn-primary:hover { background: #74b8ff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* EXERCISE LIST */
  .exercise-group { margin-bottom: 20px; }
  .exercise-group h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .exercise-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .exercise-item:hover { border-color: #3a3a3a; }
  .exercise-item.checked {
    background: var(--done);
    border-color: var(--done-text);
    opacity: 0.85;
  }
  .exercise-item.checked .ex-name { text-decoration: line-through; color: var(--done-text); }
  .exercise-item.checked .ex-detail { color: #6a8a30; }
  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 13px;
  }
  .exercise-item.checked .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0e;
  }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .ex-detail { font-size: 12px; color: var(--muted); }
  .ex-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--border);
    flex-shrink: 0;
    letter-spacing: 1px;
  }
  .exercise-item.checked .ex-num { color: var(--done-text); }

  /* COMPLETE DAY BANNER */
  .complete-banner {
    background: var(--done);
    border: 1px solid var(--done-text);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
    display: none;
  }
  .complete-banner h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 2px; }
  .complete-banner p { font-size: 13px; color: #8ab840; margin-top: 4px; }

  /* REST DAY */
  .rest-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  .rest-icon { font-size: 40px; margin-bottom: 12px; }
  .rest-day h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--rest-text); }
  .rest-day p { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* CALENDAR */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-nav {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
  .cal-month { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    padding: 4px 0 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    gap: 2px;
  }
  .cal-day.empty { background: transparent; border-color: transparent; }
  .cal-day.today { border-color: var(--accent); color: var(--accent); }
  .cal-day.completed { background: var(--done); border-color: var(--done-text); }
  .cal-day.completed .cal-day-num { color: var(--done-text); }
  .cal-day.rest-cal { background: var(--rest); border-color: #2a2a4a; }
  .cal-day.rest-cal .cal-day-num { color: var(--rest-text); }
  .cal-day.skipped { background: #2a1010; border-color: #5c2020; }
  .cal-day.skipped .cal-day-num { color: #aa5050; }
  .cal-day.future { opacity: 0.4; }
  .cal-day-num { font-size: 13px; line-height: 1; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .cal-day.skipped .cal-dot { background: #aa5050; }
  .cal-day.rest-cal .cal-dot { background: var(--rest-text); }
  .cal-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .cal-day.completed .cal-label { color: var(--done-text); opacity: 0.7; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); letter-spacing: 2px; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-card.accent2 .stat-num { color: var(--accent2); }
  .stat-card.full { grid-column: 1 / -1; }

  /* STREAK */
  .streak-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
  .streak-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: var(--border);
    flex-shrink: 0;
  }
  .streak-dot.done { background: var(--accent); }
  .streak-dot.skip { background: #5c2020; }
  .streak-dot.rest { background: #1a1a3a; }

  /* HISTORY */
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-item .hi-left { flex: 1; }
  .history-item .hi-date { font-size: 12px; color: var(--muted); }
  .history-item .hi-name { font-size: 14px; font-weight: 500; margin-top: 2px; }
  .hi-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .hi-badge.done { background: var(--done); color: var(--done-text); }
  .hi-badge.skip { background: #2a1010; color: #aa5050; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 24px;
    width: 100%;
    max-width: 600px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-buttons { display: flex; gap: 10px; }

  /* YEAR HEATMAP */
  .year-section { margin-bottom: 24px; }
  .year-section h3 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; }
  .heatmap { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 4px; }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: var(--border);
    flex-shrink: 0;
  }
  .heatmap-cell.done { background: var(--accent); }
  .heatmap-cell.skip { background: #5c2020; }
  .heatmap-cell.rest { background: #1a1a3a; }
  .heatmap-cell.future { background: #1a1a1a; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">MEU TREINO</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div id="headerBadge"></div>
  </div>
  <div class="progress-wrap" id="headerProgress" style="display:none">
    <div class="progress-label">
      <span id="progressLabel">Progresso de hoje</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('hoje')">Hoje</div>
  <div class="tab" onclick="switchTab('calendario')">Calendário</div>
  <div class="tab" onclick="switchTab('progresso')">Progresso</div>
  <div class="tab" onclick="switchTab('historico')">Histórico</div>
</div>

<div class="content">

  <!-- TODAY -->
  <div class="section active" id="sec-hoje">
    <div id="todayContent"></div>
  </div>

  <!-- CALENDAR -->
  <div class="section" id="sec-calendario">
    <div class="calendar-header">
      <button class="cal-nav" onclick="changeMonth(-1)">&#8592;</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
        <div style="width:10px;height:10px;border-radius:3px;background:var(--done);border:1px solid var(--done-text)"></div> Concluído
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
        <div style="width:10px;height:10px;border-radius:3px;background:#2a1010;border:1px solid #5c2020"></div> Faltou
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
        <div style="width:10px;height:10px;border-radius:3px;background:var(--rest);border:1px solid #1e1e35"></div> Descanso
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="section" id="sec-progresso">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="year-section">
      <h3>Últimas 16 semanas</h3>
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="year-section">
      <h3>Sequência (últimos 28 dias)</h3>
      <div class="streak-bar" id="streakBar"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section" id="sec-historico">
    <div id="historyList"></div>
  </div>

</div>

<!-- SKIP MODAL -->
<div class="modal-overlay" id="skipModal">
  <div class="modal">
    <h3>Faltar Treino</h3>
    <p>Você quer marcar o treino de hoje como faltado e postergar para amanhã? Todos os treinos seguintes também serão adiados.</p>
    <div class="modal-buttons">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;background:#f13535;color:#fff" onclick="confirmSkip()">Confirmar Falta</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const TREINOS = {
  peito: {
    label: 'Peito e Tríceps',
    short: 'PEITO',
    exercicios: [
      { nome: 'Supino inclinado com halteres ou barra', detalhe: '4 séries · 8–12 reps · 90s descanso' },
      { nome: 'Supino reto com halteres ou barra', detalhe: '3 séries · 10–12 reps · 75s descanso' },
      { nome: 'Crossover na polia (cable fly)', detalhe: '3 séries · 12–15 reps · 60s descanso' },
      { nome: 'Tríceps na polia alta (corda)', detalhe: '4 séries · 10–12 reps · 75s descanso' },
      { nome: 'Tríceps francês com halter', detalhe: '3 séries · 10–12 reps · 60s descanso' },
      { nome: 'Tríceps testa com barra W', detalhe: '3 séries · 10–12 reps · 60s descanso' },
    ]
  },
  costas: {
    label: 'Costas e Bíceps',
    short: 'COSTAS',
    exercicios: [
      { nome: 'Puxada frontal na polia (pegada aberta)', detalhe: '4 séries · 8–12 reps · 90s descanso' },
      { nome: 'Remada baixa na polia (triângulo ou barra)', detalhe: '4 séries · 8–12 reps · 90s descanso' },
      { nome: 'Remada unilateral com halter (apoiado)', detalhe: '3 séries · 10–12 reps · 75s descanso' },
      { nome: 'Pullover na polia alta (corda)', detalhe: '3 séries · 12–15 reps · 60s descanso' },
      { nome: 'Rosca direta com barra W', detalhe: '3 séries · 8–12 reps · 75s descanso' },
      { nome: 'Rosca martelo com halteres', detalhe: '3 séries · 10–12 reps · 60s descanso' },
      { nome: 'Rosca concentrada', detalhe: '2 séries · 12–15 reps · 45s descanso' },
    ]
  },
  perna: {
    label: 'Perna',
    short: 'PERNA',
    exercicios: [
      { nome: 'Agachamento na máquina (Hack Squat)', detalhe: '4 séries · 8–12 reps · 90s descanso' },
      { nome: 'Leg Press 45°', detalhe: '3 séries · 10–15 reps · 75s descanso' },
      { nome: 'Cadeira Extensora', detalhe: '3 séries · 12–15 reps · 60s descanso' },
      { nome: 'Mesa Flexora', detalhe: '3 séries · 10–12 reps · 60s descanso' },
      { nome: 'Panturrilha em pé (máquina ou step)', detalhe: '3 séries · 15–20 reps · 45s descanso' },
    ]
  },
  ombro: {
    label: 'Ombro',
    short: 'OMBRO',
    exercicios: [
      { nome: 'Desenvolvimento com halteres (sentado)', detalhe: '4 séries · 8–12 reps · 90s descanso' },
      { nome: 'Elevação frontal com corda na polia', detalhe: '3 séries · 10–12 reps · 60s descanso' },
      { nome: 'Elevação unilateral no cabo', detalhe: '3 séries · 12–15 reps · 60s descanso' },
      { nome: 'Elevação lateral com halteres', detalhe: '3 séries · 12–15 reps · 60s descanso' },
      { nome: 'Puxada polia alta com corda', detalhe: '3 séries · 12–15 reps · 60s descanso' },
      { nome: 'Crucifixo inverso na máquina', detalhe: '3 séries · 12–15 reps · 60s descanso' },
    ]
  },
  descanso: { label: 'Descanso', short: 'DSC', exercicios: [] }
};

// Fixed schedule: Mon=peito, Tue=costas, Wed=descanso, Thu=perna, Fri=ombro, Sat/Sun=descanso
// BASE_SCHEDULE[0]=Mon ... BASE_SCHEDULE[6]=Sun
const BASE_SCHEDULE = ['peito','costas','descanso','perna','ombro','descanso','descanso'];

// ============================================================
// STORAGE
// ============================================================
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function load(key, def) { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; } catch(e){ return def; } }

// State
let state = {
  days: load('mt_days', {}),
  postponeMap: load('mt_postponeMap', {}), // dateStr -> trainKey (postponed workouts)
  todayChecked: load('mt_todayChecked', {}),
};

function saveState() {
  save('mt_days', state.days);
  save('mt_postponeMap', state.postponeMap);
  save('mt_todayChecked', state.todayChecked);
}

// ============================================================
// DATE HELPERS
// ============================================================
function today() {
  const d = new Date();
  return fmtDate(d);
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function dayOfWeek(dateStr) {
  const d = parseDate(dateStr);
  return (d.getDay() + 6) % 7; // Mon=0...Sun=6
}

// Find the next date (from startDateStr onwards, exclusive) that can receive a postponed workout
// A date can receive a postponed workout if it's not already full (max 1 extra per day allowed via postponeMap)
// We simply find the next calendar day that doesn't already have a postponeMap entry
function findNextPostponeDate(fromDateStr) {
  const cursor = parseDate(fromDateStr);
  cursor.setDate(cursor.getDate() + 1);
  for (let i = 0; i < 365; i++) {
    const ds = fmtDate(cursor);
    if (!state.postponeMap[ds]) return ds;
    cursor.setDate(cursor.getDate() + 1);
  }
  return null;
}

// Compute which train to show for a given date, considering postponed days
function getTrainForDate(dateStr) {
  if (state.postponeMap && state.postponeMap[dateStr]) {
    return state.postponeMap[dateStr];
  }
  const dow = dayOfWeek(dateStr);
  return BASE_SCHEDULE[dow];
}

// ============================================================
// TODAY LOGIC
// ============================================================
let calViewDate = new Date();

function getTodayStr() { return today(); }

function getTodayTrain() {
  return getTrainForDate(getTodayStr());
}

function getTodayChecked() {
  const d = getTodayStr();
  return state.todayChecked[d] || [];
}

function toggleExercise(idx) {
  const d = getTodayStr();
  if (!state.todayChecked[d]) state.todayChecked[d] = [];
  const arr = state.todayChecked[d];
  const pos = arr.indexOf(idx);
  if (pos === -1) arr.push(idx);
  else arr.splice(pos, 1);

  const trainKey = getTodayTrain();
  const total = TREINOS[trainKey].exercicios.length;
  const allDone = arr.length === total && total > 0;

  if (allDone) {
    if (!state.days[d]) state.days[d] = {};
    state.days[d].completed = true;
    state.days[d].trainKey = trainKey;
    state.days[d].skipped = false;
  } else {
    if (state.days[d]) state.days[d].completed = false;
  }

  saveState();
  renderToday();
  updateHeaderProgress();
}

function completeDay() {
  const d = getTodayStr();
  const trainKey = getTodayTrain();
  if (!state.days[d]) state.days[d] = {};
  state.days[d].completed = true;
  state.days[d].trainKey = trainKey;
  state.days[d].skipped = false;
  // mark all checked
  const total = TREINOS[trainKey].exercicios.length;
  state.todayChecked[d] = Array.from({length: total}, (_, i) => i);
  saveState();
  renderToday();
  updateHeaderProgress();
}

function openModal() {
  document.getElementById('skipModal').classList.add('open');
}
function closeModal() {
  document.getElementById('skipModal').classList.remove('open');
}
function confirmSkip() {
  const d = getTodayStr();
  const trainKey = getTodayTrain();
  if (!state.days[d]) state.days[d] = {};
  state.days[d].skipped = true;
  state.days[d].completed = false;
  state.days[d].trainKey = trainKey;

  // Find next available date and assign this workout there
  if (trainKey !== 'descanso') {
    const nextDate = findNextPostponeDate(d);
    if (nextDate) {
      state.postponeMap[nextDate] = trainKey;
    }
  }

  saveState();
  closeModal();
  renderToday();
  updateHeaderProgress();
}

function undoSkip() {
  const d = getTodayStr();
  const dayData = state.days[d];
  if (!dayData || !dayData.skipped) return;

  const trainKey = dayData.trainKey;

  // Remove the postponed entry that was created for this skip
  if (trainKey && trainKey !== 'descanso') {
    // Find and remove the postponeMap entry that was added right after today
    for (const [dateStr, tk] of Object.entries(state.postponeMap)) {
      if (tk === trainKey && dateStr > d) {
        delete state.postponeMap[dateStr];
        break;
      }
    }
  }

  // Clear today's skip
  delete state.days[d];

  saveState();
  renderToday();
  updateHeaderProgress();
}

// ============================================================
// RENDER TODAY
// ============================================================
function renderToday() {
  const d = getTodayStr();
  const trainKey = getTodayTrain();
  const treino = TREINOS[trainKey];
  const checked = getTodayChecked();
  const dayData = state.days[d] || {};
  const container = document.getElementById('todayContent');

  const dateLabel = parseDate(d).toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  // Header badge
  const badge = document.getElementById('headerBadge');
  const prog = document.getElementById('headerProgress');

  if (trainKey === 'descanso') {
    badge.innerHTML = '<div class="rest-badge">Descanso</div>';
    prog.style.display = 'none';
    container.innerHTML = `
      <div class="rest-day">
        <div class="rest-icon">🛌</div>
        <h2>DIA DE DESCANSO</h2>
        <p>Recuperação é parte do treino.<br>Aproveite para descansar bem.</p>
      </div>`;
    return;
  }

  badge.innerHTML = `<div class="today-badge">${treino.short}</div>`;
  prog.style.display = 'block';
  document.getElementById('headerDate').textContent = dateLabel;

  const total = treino.exercicios.length;
  const done = checked.length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `${done}/${total} exercícios`;

  const isCompleted = dayData.completed;
  const isSkipped = dayData.skipped;

  let html = '';

  // Info card
  html += `<div class="today-info">
    <h2>${treino.label.toUpperCase()}</h2>
    <p>${dateLabel}</p>
    ${isSkipped ? '<p class="postpone-note">⚠️ Treino postergado de dia anterior</p>' : ''}
  </div>`;

  // Complete banner
  if (isCompleted) {
    html += `<div class="complete-banner" style="display:block">
      <h3>✅ TREINO CONCLUÍDO!</h3>
      <p>Excelente trabalho hoje. Continue assim!</p>
    </div>`;
  }

  // Action buttons
  if (!isCompleted) {
    if (isSkipped) {
      html += `<div class="action-row">
        <button class="btn btn-secondary" style="border-color:#f13535;color:#f13535" onclick="undoSkip()">↩ Desfazer falta</button>
      </div>`;
    } else {
      html += `<div class="action-row">
        <button class="btn btn-secondary" onclick="openModal()">⚡ Faltei hoje</button>
        ${done === total ? `<button class="btn btn-primary" onclick="completeDay()">✓ Fechar treino</button>` : ''}
      </div>`;
    }
  }

  // Exercises
  html += `<div class="exercise-group"><h3>Exercícios</h3>`;
  treino.exercicios.forEach((ex, i) => {
    const isChecked = checked.includes(i);
    html += `<div class="exercise-item${isChecked ? ' checked' : ''}" onclick="toggleExercise(${i})">
      <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.nome}</div>
        <div class="ex-detail">${ex.detalhe}</div>
      </div>
      <div class="checkbox">${isChecked ? '✓' : ''}</div>
    </div>`;
  });
  html += '</div>';

  container.innerHTML = html;
}

function updateHeaderProgress() {
  const d = getTodayStr();
  const trainKey = getTodayTrain();
  if (trainKey === 'descanso') return;
  const treino = TREINOS[trainKey];
  const checked = getTodayChecked();
  const total = treino.exercicios.length;
  const done = checked.length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `${done}/${total} exercícios`;
}

// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent = `${monthNames[m]} ${y}`;

  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const todayStr = today();

  let html = '';
  ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].forEach(d => {
    html += `<div class="cal-weekday">${d}</div>`;
  });

  for (let i = 0; i < startDow; i++) html += '<div class="cal-day empty"></div>';

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isFuture = dateStr > todayStr;
    const isToday = dateStr === todayStr;
    const dayData = state.days[dateStr] || {};
    const trainKey = getTrainForDate(dateStr);
    const isRest = trainKey === 'descanso';

    let cls = 'cal-day';
    let dot = '';
    let label = '';

    if (isFuture) {
      cls += ' future';
      if (isRest) cls += ' rest-cal';
    } else if (isRest) {
      cls += ' rest-cal';
      dot = '<div class="cal-dot"></div>';
    } else if (dayData.completed) {
      cls += ' completed';
      label = `<div class="cal-label">${TREINOS[dayData.trainKey]?.short || ''}</div>`;
      dot = '<div class="cal-dot"></div>';
    } else if (dayData.skipped) {
      cls += ' skipped';
      label = '<div class="cal-label" style="color:#aa5050">FALTA</div>';
      dot = '<div class="cal-dot"></div>';
    } else {
      // past workout day, not logged
      if (!isRest) dot = '<div class="cal-dot" style="background:var(--border)"></div>';
    }

    if (isToday) cls += ' today';

    html += `<div class="${cls}">
      <div class="cal-day-num">${day}</div>
      ${dot}${label}
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function changeMonth(dir) {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + dir, 1);
  renderCalendar();
}

// ============================================================
// PROGRESS
// ============================================================
function renderProgress() {
  const todayStr = today();
  const days = state.days;

  let totalCompleted = 0, totalSkipped = 0;
  let monthCompleted = 0, monthSkipped = 0;
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  Object.entries(days).forEach(([d, v]) => {
    if (v.completed) {
      totalCompleted++;
      const dd = parseDate(d);
      if (dd.getMonth() === thisMonth && dd.getFullYear() === thisYear) monthCompleted++;
    }
    if (v.skipped) {
      totalSkipped++;
      const dd = parseDate(d);
      if (dd.getMonth() === thisMonth && dd.getFullYear() === thisYear) monthSkipped++;
    }
  });

  // Streak
  let streak = 0;
  const cursor = new Date(parseDate(todayStr));
  cursor.setDate(cursor.getDate() - 1);
  while (true) {
    const ds = fmtDate(cursor);
    const tk = getTrainForDate(ds);
    if (tk === 'descanso') { cursor.setDate(cursor.getDate() - 1); continue; }
    const dd = days[ds];
    if (dd && dd.completed) { streak++; cursor.setDate(cursor.getDate() - 1); }
    else break;
  }

  const statsHtml = `
    <div class="stat-card"><div class="stat-num">${monthCompleted}</div><div class="stat-label">Treinos este mês</div></div>
    <div class="stat-card accent2"><div class="stat-num">${streak}</div><div class="stat-label">Sequência atual</div></div>
    <div class="stat-card"><div class="stat-num">${totalCompleted}</div><div class="stat-label">Total de treinos</div></div>
    <div class="stat-card"><div class="stat-num">${monthSkipped}</div><div class="stat-label">Faltas este mês</div></div>
  `;
  document.getElementById('statsGrid').innerHTML = statsHtml;

  // Heatmap (16 weeks)
  const heatmapEl = document.getElementById('heatmap');
  const weeks = 16;
  const todayDate = parseDate(todayStr);
  // Start from 16 weeks ago, on Monday
  const startDate = new Date(todayDate);
  startDate.setDate(startDate.getDate() - (weeks * 7) + 1);
  // Align to Monday
  const startDow = (startDate.getDay() + 6) % 7;
  startDate.setDate(startDate.getDate() - startDow);

  let hmHtml = '';
  const c = new Date(startDate);
  for (let w = 0; w < weeks; w++) {
    hmHtml += '<div class="heatmap-col">';
    for (let d = 0; d < 7; d++) {
      const ds = fmtDate(c);
      const isFuture = ds > todayStr;
      const tk = getTrainForDate(ds);
      const dd = days[ds];
      let cls = 'heatmap-cell';
      if (isFuture) cls += ' future';
      else if (tk === 'descanso') cls += ' rest';
      else if (dd && dd.completed) cls += ' done';
      else if (dd && dd.skipped) cls += ' skip';
      hmHtml += `<div class="${cls}" title="${ds}"></div>`;
      c.setDate(c.getDate() + 1);
    }
    hmHtml += '</div>';
  }
  heatmapEl.innerHTML = hmHtml;

  // Streak bar (28 days)
  const streakEl = document.getElementById('streakBar');
  let sbHtml = '';
  const sc = new Date(todayDate);
  sc.setDate(sc.getDate() - 27);
  for (let i = 0; i < 28; i++) {
    const ds = fmtDate(sc);
    const isFuture = ds > todayStr;
    const tk = getTrainForDate(ds);
    const dd = days[ds];
    let cls = 'streak-dot';
    if (isFuture) {}
    else if (tk === 'descanso') cls += ' rest';
    else if (dd && dd.completed) cls += ' done';
    else if (dd && dd.skipped) cls += ' skip';
    sbHtml += `<div class="${cls}" title="${ds}"></div>`;
    sc.setDate(sc.getDate() + 1);
  }
  streakEl.innerHTML = sbHtml;
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const entries = Object.entries(state.days)
    .filter(([,v]) => v.completed || v.skipped)
    .sort(([a],[b]) => b.localeCompare(a))
    .slice(0, 60);

  if (entries.length === 0) {
    document.getElementById('historyList').innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px">Nenhum treino registrado ainda.</div>`;
    return;
  }

  let html = '';
  entries.forEach(([d, v]) => {
    const dateLabel = parseDate(d).toLocaleDateString('pt-BR', {weekday:'short', day:'numeric', month:'short'});
    const trainName = v.trainKey ? TREINOS[v.trainKey]?.label || '' : '';
    html += `<div class="history-item">
      <div class="hi-left">
        <div class="hi-date">${dateLabel}</div>
        <div class="hi-name">${trainName || (v.skipped ? 'Treino faltado' : '')}</div>
      </div>
      <div class="hi-badge ${v.completed ? 'done' : 'skip'}">${v.completed ? '✓ Feito' : '✗ Falta'}</div>
    </div>`;
  });
  document.getElementById('historyList').innerHTML = html;
}

// ============================================================
// TABS
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['hoje','calendario','progresso','historico'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');

  if (name === 'calendario') renderCalendar();
  if (name === 'progresso') renderProgress();
  if (name === 'historico') renderHistory();
}

// ============================================================
// INIT
// ============================================================
function init() {
  const d = getTodayStr();
  document.getElementById('headerDate').textContent = parseDate(d).toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  renderToday();
}

init();
</script>
</body>
</html>
